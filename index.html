<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#1a5a9e"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Agenda RBR"/>
<meta name="description" content="Agenda RBR — Equipe de Campo"/>
<meta name="version" content="v7-abas"/>
<title>Agenda RBR</title>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="logo_rbr.png"/>
<link rel="icon" type="image/png" href="logo_rbr.png"/>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800;900&family=Barlow+Condensed:wght@600;700;800;900&display=swap" rel="stylesheet"/>
<style>
:root{
  --cream:#f5f1eb; --cream-dark:#ede8df; --cream-border:#ddd6c8;
  --rbr-blue:#1a5a9e; --rbr-blue-dark:#134882; --rbr-sky:#3c9dd0;
  --text:#1a2533; --muted:#7a8898; --muted-light:#aab0ba;
  --manha:#1a5a9e; --tarde:#e07b1a; --noite:#5b2d8e;
  --aniversario:#c0392b; --diurno-not:#1a7a5e; --matutino:#0e7c86;
  --radius:12px;
  --shadow:0 2px 10px rgba(26,90,158,.08);
  --shadow-md:0 4px 20px rgba(26,90,158,.13);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{font-family:'Barlow',sans-serif;background:var(--cream);color:var(--text);min-height:100vh}

/* ── HEADER ── */
.header{background:var(--cream);border-bottom:2px solid var(--cream-border);padding:12px 20px;position:sticky;top:0;z-index:200}
.header-inner{max-width:1300px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.logo-area{display:flex;align-items:center;gap:10px}
.logo-img{height:34px;width:auto;display:block}
.header-label{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted)}
.header-title{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;color:var(--rbr-blue);letter-spacing:-.3px;text-transform:uppercase;line-height:1.1}
.btn-hoje{background:var(--rbr-blue);color:#fff;font-family:'Barlow',sans-serif;font-size:11px;font-weight:700;padding:8px 14px;border-radius:20px;cursor:pointer;border:none;display:flex;align-items:center;gap:5px;white-space:nowrap;transition:background .2s}
.btn-hoje:hover{background:var(--rbr-blue-dark)}

/* ── TABS ── */
.tabs-bar{background:var(--cream);border-bottom:2px solid var(--cream-border);padding:0 20px}
.tabs-inner{max-width:1300px;margin:0 auto;display:flex;gap:0}
.tab-btn{
  font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:800;
  text-transform:uppercase;letter-spacing:.6px;padding:12px 20px;
  border:none;background:none;color:var(--muted);cursor:pointer;
  border-bottom:3px solid transparent;margin-bottom:-2px;
  transition:all .2s;white-space:nowrap;display:flex;align-items:center;gap:7px;
}
.tab-btn:hover{color:var(--rbr-blue)}
.tab-btn.active{color:var(--rbr-blue);border-bottom-color:var(--rbr-blue)}
.tab-count{background:var(--rbr-blue);color:#fff;font-size:10px;font-weight:800;padding:1px 6px;border-radius:10px;line-height:1.5}
.tab-btn:not(.active) .tab-count{background:var(--cream-border);color:var(--muted)}

/* ── SEARCH ── */
.search-bar{background:var(--cream);border-bottom:1px solid var(--cream-border);padding:10px 20px}
.search-bar-inner{max-width:1300px;margin:0 auto;position:relative}
.search-bar svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted-light);width:15px;height:15px}
#searchInput{width:100%;background:var(--cream-dark);border:1.5px solid var(--cream-border);border-radius:10px;padding:9px 12px 9px 34px;font-family:'Barlow',sans-serif;font-size:14px;color:var(--text);outline:none}
#searchInput:focus{border-color:var(--rbr-blue)}
#searchInput::placeholder{color:var(--muted-light)}

/* ── PAGE LAYOUT ── */
.page{max-width:1300px;margin:0 auto;padding:20px 20px 80px;display:grid;grid-template-columns:1fr;gap:20px}
@media(min-width:960px){.page{grid-template-columns:380px 1fr;align-items:start}}
@media(min-width:1200px){.page{grid-template-columns:420px 1fr}}

/* panels */
.panel{display:none}
.panel.active{display:contents}

/* ── CALENDAR CARD ── */
.cal-card{background:#fff;border-radius:var(--radius);border:1.5px solid var(--cream-border);box-shadow:var(--shadow);overflow:hidden}
.cal-card-header{background:var(--cream);border-bottom:1.5px solid var(--cream-border);padding:12px 14px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.cal-nav{background:#fff;border:1.5px solid var(--cream-border);color:var(--rbr-blue);border-radius:8px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:background .15s}
.cal-nav:hover{background:var(--cream-dark)}
.cal-month-title{text-align:center;flex:1}
.cal-month-name{font-family:'Barlow Condensed',sans-serif;font-size:19px;font-weight:900;color:var(--rbr-blue);text-transform:uppercase;letter-spacing:.5px;line-height:1}
.cal-year-lbl{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.5px;margin-top:1px}
.cal-body{padding:12px}
.cal-weekdays{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;margin-bottom:6px}
.cal-weekdays span{font-size:9px;font-weight:800;color:var(--muted);letter-spacing:.6px;text-transform:uppercase;padding:3px 0}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-day{aspect-ratio:1;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;background:transparent;border:1.5px solid transparent;transition:all .15s;position:relative;gap:2px}
.cal-day.empty{visibility:hidden;pointer-events:none}
.cal-day:hover:not(.empty){background:var(--cream-dark)}
.cal-day.has-action{background:var(--cream);border-color:var(--cream-border)}
.cal-day.today{border-color:var(--rbr-blue)!important;background:rgba(26,90,158,.06)}
.cal-day.dom .cal-day-num{color:#e05a1a}
.cal-day.selected{background:var(--rbr-blue)!important;border-color:var(--rbr-blue)!important}
.cal-day.selected .cal-day-num{color:#fff!important}
.cal-day.selected .cal-day-count{color:var(--rbr-blue);background:#fff}
.cal-day-num{font-size:12px;font-weight:700;line-height:1;color:var(--text)}
.cal-day-dots{display:flex;gap:2px;justify-content:center;flex-wrap:wrap;max-width:26px}
.cal-day-dots span{width:4px;height:4px;border-radius:50%;display:inline-block}
.cal-day-count{position:absolute;top:1px;right:2px;font-size:7.5px;font-weight:800;color:var(--rbr-blue);background:#fff;border-radius:5px;padding:0 2px;line-height:1.5}

/* range pills on calendar (for internal events) */
.cal-range-dot{display:inline-block;width:8px;height:8px;border-radius:50%;flex-shrink:0}

.cal-clear{display:none;width:100%;margin-top:10px;padding:8px;background:var(--cream);border:1.5px solid var(--cream-border);border-radius:9px;font-size:12px;font-weight:700;color:var(--rbr-blue);cursor:pointer;align-items:center;justify-content:center;gap:6px}
.cal-clear.show{display:flex}
.cal-legend{padding:0 12px 12px;display:flex;flex-wrap:wrap;gap:6px}
.cal-legend-item{display:flex;align-items:center;gap:4px;font-size:10px;font-weight:600;color:var(--muted)}
.cal-legend-item .dot{width:7px;height:7px;border-radius:50%}

/* ── FILTER PANEL ── */
.filter-card{background:#fff;border-radius:var(--radius);border:1.5px solid var(--cream-border);box-shadow:var(--shadow);padding:14px;margin-top:14px}
.filter-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.filter-title{font-size:9px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:1.2px}
.btn-clear-f{background:#fde9e9;color:var(--aniversario);border:1.5px solid #f5c8c8;border-radius:14px;padding:5px 11px;font-size:11px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:4px}
.btn-clear-f:hover{background:#fbdada}
.filter-group{margin-bottom:11px}
.filter-group:last-child{margin-bottom:0}
.filter-group-lbl{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:7px;display:block}
.chip-row{display:flex;flex-wrap:wrap;gap:6px}
.chip{background:var(--cream);border:1.5px solid var(--cream-border);border-radius:16px;padding:5px 11px;font-family:'Barlow',sans-serif;font-size:12px;font-weight:600;color:var(--text);cursor:pointer;white-space:nowrap;transition:all .15s;display:inline-flex;align-items:center;gap:5px}
.chip:hover{border-color:var(--rbr-blue)}
.chip.active{background:var(--rbr-blue);border-color:var(--rbr-blue);color:#fff}
.chip.active .cdot{background:#fff!important}
.cdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
select.flt{width:100%;background:var(--cream);border:1.5px solid var(--cream-border);border-radius:9px;padding:8px 10px;font-family:'Barlow',sans-serif;font-size:13px;font-weight:600;color:var(--text);cursor:pointer;outline:none}
select.flt:focus{border-color:var(--rbr-blue)}

/* ── SUMMARY ── */
.active-filters{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.af-tag{background:#e8f1ff;color:var(--rbr-blue);border:1.5px solid #c5d8f7;border-radius:12px;padding:4px 11px 4px 8px;font-size:11px;font-weight:600;display:flex;align-items:center;gap:5px;cursor:pointer}
.af-tag:hover{background:#d8eaff}
.af-tag span{font-weight:900}
.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.stat-card{background:#fff;border-radius:var(--radius);border:1.5px solid var(--cream-border);box-shadow:var(--shadow);padding:12px 8px;text-align:center}
.stat-num{font-family:'Barlow Condensed',sans-serif;font-size:30px;font-weight:900;color:var(--rbr-blue);line-height:1}
.stat-lbl{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-top:3px}

/* ── CARDS ── */
.date-group{margin-bottom:24px}
.date-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.date-badge{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:900;padding:4px 14px;border-radius:20px;white-space:nowrap;letter-spacing:.5px;text-transform:uppercase;background:var(--rbr-blue);color:#fff}
.date-badge.today{background:var(--rbr-sky);box-shadow:0 3px 12px rgba(60,157,208,.35)}
.date-line{flex:1;height:1.5px;background:var(--cream-border)}
.action-card{background:#fff;border-radius:var(--radius);border:1.5px solid var(--cream-border);box-shadow:var(--shadow);margin-bottom:10px;overflow:hidden;transition:all .15s}
.action-card:hover{box-shadow:var(--shadow-md);border-color:#c0cfe8}
.card-bar{height:4px}
.tm  .card-bar{background:linear-gradient(to right,var(--manha),var(--rbr-sky))}
.tt  .card-bar{background:linear-gradient(to right,var(--tarde),#f5a623)}
.tn  .card-bar{background:linear-gradient(to right,var(--noite),#9b59b6)}
.tdn .card-bar{background:linear-gradient(to right,var(--manha),var(--diurno-not))}
.ta  .card-bar{background:linear-gradient(to right,var(--aniversario),#e74c3c)}
.tmat .card-bar{background:linear-gradient(to right,var(--matutino),#3cc8d8)}
.card-body{padding:12px 14px 14px}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:6px}
.card-acao{font-size:15px;font-weight:700;color:var(--text);line-height:1.2;flex:1}
.turno-pill{font-size:9px;font-weight:800;padding:3px 9px;border-radius:10px;letter-spacing:.4px;white-space:nowrap;text-transform:uppercase;flex-shrink:0}
.tm   .turno-pill{background:#e3eeff;color:var(--manha)}
.tt   .turno-pill{background:#fff1e0;color:var(--tarde)}
.tn   .turno-pill{background:#f0e6ff;color:var(--noite)}
.tdn  .turno-pill{background:#e2fff6;color:var(--diurno-not)}
.ta   .turno-pill{background:#fde5e5;color:var(--aniversario)}
.tmat .turno-pill{background:#e0f9fb;color:var(--matutino)}
.card-loja{font-size:12.5px;font-weight:600;color:var(--rbr-blue);margin-bottom:8px;display:flex;align-items:center;gap:5px}
.card-tags{display:flex;flex-wrap:wrap;gap:5px}
.tag{font-size:10.5px;font-weight:600;padding:3px 8px;border-radius:7px;display:flex;align-items:center;gap:3px}
.tag-m{background:var(--cream);border:1px solid var(--cream-border);color:var(--text)}
.tag-r{background:#f0f0f0;border:1px solid #e0e0e0;color:#555}
.tag-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

/* ── INTERNAL CALENDAR (tab 2) ── */
.int-cal-wrap{grid-column:1/-1}
.int-cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:12px;flex-wrap:wrap}
.int-cal-title{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:900;color:var(--rbr-blue);text-transform:uppercase;letter-spacing:-.3px}
.int-month-nav{display:flex;align-items:center;gap:8px}
.int-nav-btn{background:#fff;border:1.5px solid var(--cream-border);color:var(--rbr-blue);border-radius:8px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s}
.int-nav-btn:hover{background:var(--cream-dark)}

/* big calendar grid */
.int-cal-card{background:#fff;border-radius:var(--radius);border:1.5px solid var(--cream-border);box-shadow:var(--shadow);overflow:hidden}
.int-weekdays{display:grid;grid-template-columns:repeat(7,1fr);background:var(--cream);border-bottom:1.5px solid var(--cream-border)}
.int-weekdays span{text-align:center;padding:10px 4px;font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.8px}
.int-weekdays span:last-child{color:#e05a1a}
.int-grid{display:grid;grid-template-columns:repeat(7,1fr);border-left:1.5px solid var(--cream-border)}
.int-cell{border-right:1.5px solid var(--cream-border);border-bottom:1.5px solid var(--cream-border);min-height:80px;padding:6px 7px;position:relative;background:#fff}
@media(max-width:600px){.int-cell{min-height:52px;padding:4px 4px}}
.int-cell.empty{background:var(--cream);opacity:.5}
.int-cell.today-cell{background:rgba(26,90,158,.05)}
.int-cell-num{font-size:13px;font-weight:700;color:var(--text);line-height:1;margin-bottom:4px}
.int-cell.dom-cell .int-cell-num{color:#e05a1a}
.int-cell.today-cell .int-cell-num{background:var(--rbr-blue);color:#fff;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px}
.int-event{font-size:9.5px;font-weight:700;padding:2px 5px;border-radius:5px;margin-bottom:2px;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:default}
@media(max-width:600px){.int-event{font-size:7.5px;padding:1px 3px}}

/* event sidebar */
.int-layout{display:grid;grid-template-columns:1fr;gap:16px}
@media(min-width:960px){.int-layout{grid-template-columns:220px 1fr}}
.int-sidebar{background:#fff;border-radius:var(--radius);border:1.5px solid var(--cream-border);box-shadow:var(--shadow);padding:14px}
.int-sidebar-title{font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
.int-ev-item{display:flex;align-items:flex-start;gap:8px;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--cream-border)}
.int-ev-item:last-child{margin-bottom:0;padding-bottom:0;border-bottom:none}
.int-ev-day{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;color:var(--rbr-blue);line-height:1;flex-shrink:0;min-width:28px}
.int-ev-info{}
.int-ev-title{font-size:12px;font-weight:700;color:var(--text);line-height:1.3}
.int-ev-sub{font-size:10px;font-weight:500;color:var(--muted);margin-top:2px}
.int-ev-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}

/* event color codes */
.ev-blue{background:#e3eeff;color:#1a5a9e}
.ev-orange{background:#fff1e0;color:#b85c00}
.ev-red{background:#fde5e5;color:#c0392b}
.ev-green{background:#e0f5ee;color:#1a7a5e}
.ev-teal{background:#e0f9fb;color:#0e7c86}
.ev-purple{background:#f0e6ff;color:#5b2d8e}
.ev-gold{background:#fef9e0;color:#9a7200}

.no-results{text-align:center;padding:60px 20px;color:var(--muted)}
.no-results p{font-size:15px;font-weight:500}

/* ── FOOTER ── */
.footer{background:var(--cream-dark);border-top:1.5px solid var(--cream-border);padding:16px 20px;text-align:center;font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.3px}
.footer strong{color:var(--rbr-blue)}
.footer-logo{height:20px;width:auto;margin:6px auto 0;display:block;opacity:.5}

/* ── INSTALL BANNER ── */
#installBanner{display:none;position:fixed;bottom:16px;left:16px;right:16px;max-width:480px;background:linear-gradient(135deg,var(--rbr-blue-dark),var(--rbr-blue));color:#fff;border-radius:var(--radius);padding:14px 16px;box-shadow:0 8px 30px rgba(26,90,158,.35);z-index:300;animation:slideUp .3s ease}
@keyframes slideUp{from{transform:translateY(80px);opacity:0}to{transform:translateY(0);opacity:1}}
.install-inner{display:flex;align-items:center;gap:12px}
.install-txt{flex:1;font-size:13px;line-height:1.4}
.install-txt strong{display:block;font-size:14px;margin-bottom:1px}
.btn-inst{background:rgba(255,255,255,.20);border:1.5px solid rgba(255,255,255,.45);color:#fff;font-family:'Barlow',sans-serif;font-size:12px;font-weight:700;padding:6px 14px;border-radius:20px;cursor:pointer;white-space:nowrap}
.btn-cls{background:none;border:none;color:rgba(255,255,255,.7);font-size:18px;cursor:pointer;padding:2px 6px}

@media(max-width:500px){
  .header-title{font-size:18px}.logo-img{height:28px}.btn-hoje{font-size:10px;padding:7px 10px}
  .stat-num{font-size:24px}.int-cal-title{font-size:22px}.tab-btn{font-size:12px;padding:10px 12px}
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-inner">
    <div class="logo-area">
      <img src="logo_rbr.png" alt="RBR" class="logo-img"/>
      <div>
        <div class="header-label">Equipe de Campo</div>
        <div class="header-title">Agenda RBR</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
      <button class="btn-hoje" onclick="filtrarHoje()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        Hoje
      </button>
    </div>
  </div>
</header>

<!-- TABS -->
<div class="tabs-bar">
  <div class="tabs-inner">
    <button class="tab-btn active" id="tabPromoBtn" onclick="switchTab('promo')">
      📋 Agenda Promotores
      <span class="tab-count" id="tabPromoCount">0</span>
    </button>
    <button class="tab-btn" id="tabInternBtn" onclick="switchTab('intern')">
      🗓 Agenda Interna RBR
    </button>
  </div>
</div>

<!-- SEARCH (only for promotores) -->
<div class="search-bar" id="searchBarWrap">
  <div class="search-bar-inner">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input id="searchInput" type="text" placeholder="Buscar ação, loja, marca, responsável…" oninput="renderPromo()"/>
  </div>
</div>

<!-- ═══════════════════════════════════
     TAB 1 — AGENDA PROMOTORES
     ═══════════════════════════════════ -->
<div id="panelPromo" class="page">

  <!-- LEFT: CALENDAR + FILTERS -->
  <div>
    <div class="cal-card">
      <div class="cal-card-header">
        <div class="cal-nav" onclick="changeMonthP(-1)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
        </div>
        <div class="cal-month-title">
          <div class="cal-month-name" id="calMonthNameP"></div>
          <div class="cal-year-lbl" id="calYearP"></div>

/* ── PROMO HELPERS ── */
function tcls(t){
  const l=t.toLowerCase();
  if(l.includes('aniversário')||l.includes('aniversario'))return'ta';
  if(l.includes('noturno')&&l.includes('diurno'))return'tdn';
  if(l.includes('noite')||l.includes('noturno'))return'tn';
  if(l.includes('tarde'))return'tt';
  if(l.includes('matutino'))return'tmat';
  return'tm';
}
function tpill(t){
  const l=t.toLowerCase();
  if(l.includes('aniversário')||l.includes('aniversario'))return'🎂 Aniversário';
  if(l.includes('noturno')&&l.includes('diurno'))return'☀️🌙 Dia/Noite';
  if(l.includes('noite')||l.includes('noturno'))return'🌙 Noite';
  if(l.includes('tarde'))return'🌅 Tarde';
  if(l.includes('matutino'))return'🌄 Manhã';
  return'☀️ Diurno';
}
function todayKey(){const n=new Date();return String(n.getDate()).padStart(2,'0')+'/'+String(n.getMonth()+1).padStart(2,'0')}
function dmKey(d,m){return String(d).padStart(2,'0')+'/'+String(m+1).padStart(2,'0')}

function initUI(){
  const allM=[...new Set(AGENDA.flatMap(a=>a.marcas))].sort();
  const cr=document.getElementById('chipMarcas');
  allM.forEach(m=>{
    const c=document.createElement('div');c.className='chip';c.dataset.m=m;
    c.innerHTML=`<span class="cdot" style="background:${mc(m)}"></span>${m}`;
    c.onclick=()=>toggleM(m);cr.appendChild(c);
  });
  [...new Set(AGENDA.map(a=>a.resp))].sort().forEach(r=>{
    const o=document.createElement('option');o.value=r;o.textContent=r;
    document.getElementById('fResp').appendChild(o);
  });
  [...new Set(AGENDA.map(a=>a.loja))].sort().forEach(l=>{
    const o=document.createElement('option');o.value=l;o.textContent=l;
    document.getElementById('fLoja').appendChild(o);
  });
  const leg=document.getElementById('calLegendP');
  leg.innerHTML=allM.map(m=>`<div class="cal-legend-item"><span class="dot" style="background:${mc(m)}"></span>${m}</div>`).join('');
  document.getElementById('tabPromoCount').textContent=AGENDA.length;
}

}

  activeMarcas.clear();
  document.querySelectorAll('#chipMarcas .chip').forEach(c=>c.classList.remove('active'));
  document.getElementById('fResp').value='';document.getElementById('fLoja').value='';
  document.getElementById('searchInput').value='';selectedDayP=null;renderPromo();
}

/* ── PROMO FILTER ── */
function filterPromo(ignDay){
  const q=document.getElementById('searchInput').value.toLowerCase();
  const fr=document.getElementById('fResp').value;
  const fl=document.getElementById('fLoja').value;
  return AGENDA.filter(a=>{
    const s=!q||[a.acao,a.loja,a.resp,...a.marcas,a.data].some(v=>v.toLowerCase().includes(q));
    const m=activeMarcas.size===0||a.marcas.some(x=>activeMarcas.has(x));
    const r=!fr||a.resp===fr;
    const l=!fl||a.loja===fl;
    const d=ignDay||!selectedDayP||a.data===selectedDayP;
    return s&&m&&r&&l&&d;
  });
}

/* ── PROMO CALENDAR ── */
function changeMonthP(delta){calMonthP+=delta;if(calMonthP<0){calMonthP=11;calYearP--;}if(calMonthP>11){calMonthP=0;calYearP++;}renderPromo();}
function clearDayP(){selectedDayP=null;renderPromo();}
function selectDayP(key,count){if(!count)return;selectedDayP=selectedDayP===key?null:key;renderPromo();}

function renderCalP(){
  document.getElementById('calMonthNameP').textContent=MESES[calMonthP].toUpperCase();
  document.getElementById('calYearP').textContent=calYearP;
  const forCal=filterPromo(true),byDay={};
  forCal.forEach(a=>{if(!byDay[a.data])byDay[a.data]=[];byDay[a.data].push(a);});
  const today=todayKey(),isNow=calYearP===new Date().getFullYear()&&calMonthP===new Date().getMonth();
  const firstWD=new Date(calYearP,calMonthP,1).getDay(),dim=new Date(calYearP,calMonthP+1,0).getDate();
  const grid=document.getElementById('calGridP');grid.innerHTML='';
  for(let i=0;i<firstWD;i++){const e=document.createElement('div');e.className='cal-day empty';grid.appendChild(e);}
  for(let d=1;d<=dim;d++){
    const key=dmKey(d,calMonthP),entries=byDay[key]||[],dow=new Date(calYearP,calMonthP,d).getDay();
    const cell=document.createElement('div');
    cell.className='cal-day'+(entries.length?' has-action':'')+(isNow&&key===today?' today':'')+(selectedDayP===key?' selected':'')+(dow===0?' dom':'');
    cell.onclick=()=>selectDayP(key,entries.length);
    const dots=[...new Set(entries.flatMap(e=>e.marcas))].slice(0,6);
    cell.innerHTML=`${entries.length?`<div class="cal-day-count">${entries.length}</div>`:''}<div class="cal-day-num">${d}</div>${entries.length?`<div class="cal-day-dots">${dots.map(m=>`<span style="background:${mc(m)}"></span>`).join('')}</div>`:''}`;
    grid.appendChild(cell);
  }
  document.getElementById('calClearP').classList.toggle('show',!!selectedDayP);
}

/* ── PROMO RENDER ── */
function renderPromo(){
  const list=filterPromo(false);
  document.getElementById('sAcoes').textContent=list.length;
  document.getElementById('sLojas').textContent=new Set(list.map(a=>a.loja)).size;
  document.getElementById('sMarcas').textContent=new Set(list.flatMap(a=>a.marcas)).size;

  const afc=document.getElementById('activeFilters');afc.innerHTML='';
  if(selectedDayP)afc.innerHTML+=`<div class="af-tag" onclick="clearDayP()">📅 ${selectedDayP} <span>✕</span></div>`;
  activeMarcas.forEach(m=>afc.innerHTML+=`<div class="af-tag" onclick="toggleM('${m.replace(/'/g,"\\'")}')">🏷 ${m} <span>✕</span></div>`);
  const fr=document.getElementById('fResp').value,fl=document.getElementById('fLoja').value;
  if(fr)afc.innerHTML+=`<div class="af-tag" onclick="document.getElementById('fResp').value='';renderPromo()">👤 ${fr.split(' ')[0]} <span>✕</span></div>`;
  if(fl)afc.innerHTML+=`<div class="af-tag" onclick="document.getElementById('fLoja').value='';renderPromo()">🏬 ${fl.substring(0,20)} <span>✕</span></div>`;

  const container=document.getElementById('agendaList');
  if(!list.length){container.innerHTML='<div class="no-results"><p>😕 Nenhuma ação encontrada</p></div>';renderCalP();return;}
  const hoje=todayKey(),groups={};
  list.forEach(a=>{if(!groups[a.data])groups[a.data]=[];groups[a.data].push(a);});
  const sorted=Object.keys(groups).sort((a,b)=>{const[da,ma]=a.split('/').map(Number),[db,mb]=b.split('/').map(Number);return(ma-mb)||(da-db);});
  container.innerHTML='';
  sorted.forEach(data=>{
    const isToday=data===hoje,g=document.createElement('div');g.className='date-group';
    g.innerHTML=`<div class="date-header"><div class="date-badge${isToday?' today':''}">${data}${isToday?' · HOJE':''}</div><div class="date-line"></div></div>`;
    groups[data].forEach(item=>{
      const cls=tcls(item.turno),card=document.createElement('div');card.className=`action-card ${cls}`;
      card.innerHTML=`<div class="card-bar"></div><div class="card-body"><div class="card-top"><div class="card-acao">${item.acao}</div><div class="turno-pill">${tpill(item.turno)}</div></div><div class="card-loja"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>${item.loja}</div><div class="card-tags">${item.marcas.map(m=>`<span class="tag tag-m"><span class="tag-dot" style="background:${mc(m)}"></span>${m}</span>`).join('')}<span class="tag tag-r">👤 ${item.resp}</span></div></div>`;
      g.appendChild(card);
    });
    container.appendChild(g);
  });
  renderCalP();
}

/* ── INTERNAL CALENDAR ── */
function changeMonthI(delta){calMonthI+=delta;if(calMonthI<0){calMonthI=11;calYearI--;}if(calMonthI>11){calMonthI=0;calYearI++;}renderInternal();}

function renderInternal(){
  document.getElementById('intCalTitle').textContent=MESES[calMonthI].toUpperCase()+' '+calYearI;
  const key=calYearI+'-'+String(calMonthI+1).padStart(2,'0');
  const events=INT_EVENTS[key]||[];
  const today=new Date(),isNow=calYearI===today.getFullYear()&&calMonthI===today.getMonth();
  const todayD=today.getDate();
  const firstWD=new Date(calYearI,calMonthI,1).getDay(),dim=new Date(calYearI,calMonthI+1,0).getDate();

  // build day->events map
  const byDay={};
  events.forEach(ev=>{
    if(ev.single){
      if(!byDay[ev.d])byDay[ev.d]=[];byDay[ev.d].push(ev);
    } else {
      for(let d=ev.d1;d<=ev.d2;d++){if(!byDay[d])byDay[d]=[];byDay[d].push({...ev,isRange:true,isStart:d===ev.d1,isEnd:d===ev.d2});}
    }
  });

  // grid
  const grid=document.getElementById('intGrid');grid.innerHTML='';
  for(let i=0;i<firstWD;i++){const e=document.createElement('div');e.className='int-cell empty';grid.appendChild(e);}
  for(let d=1;d<=dim;d++){
    const dow=new Date(calYearI,calMonthI,d).getDay();
    const cell=document.createElement('div');
    cell.className='int-cell'+(dow===0?' dom-cell':'')+(isNow&&d===todayD?' today-cell':'');
    const numEl=document.createElement('div');numEl.className='int-cell-num';numEl.textContent=d;cell.appendChild(numEl);
    (byDay[d]||[]).forEach(ev=>{
      const el=document.createElement('div');el.className=`int-event ${ev.cls}`;
      el.textContent=(ev.isRange&&!ev.isStart)?'↳ '+ev.label:ev.label;
      el.title=ev.label;cell.appendChild(el);
    });
    grid.appendChild(cell);
  }

  // sidebar
  const sb=document.getElementById('intSidebar');sb.innerHTML='';
  if(!events.length){sb.innerHTML='<p style="font-size:12px;color:var(--muted)">Nenhum evento neste mês.</p>';return;}
  const seen=new Set();
  events.forEach(ev=>{
    const lbl=ev.label;if(seen.has(lbl))return;seen.add(lbl);
    const dayStr=ev.single?ev.d:(ev.d1+(ev.d1!==ev.d2?' – '+ev.d2:''));
    const item=document.createElement('div');item.className='int-ev-item';
    item.innerHTML=`<div class="int-ev-day">${dayStr}</div><div class="int-ev-info"><div class="int-ev-title">${lbl}</div></div>`;
    sb.appendChild(item);
  });
}

function filtrarHoje(){
  if(activeTab==='intern'){calMonthI=new Date().getMonth();calYearI=new Date().getFullYear();renderInternal();}
  else{selectedDayP=todayKey();calMonthP=new Date().getMonth();calYearP=new Date().getFullYear();document.getElementById('searchInput').value='';renderPromo();document.getElementById('agendaList').scrollIntoView({behavior:'smooth'});}
}

/* PWA */
let deferredPrompt;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;document.getElementById('installBanner').style.display='block';});
document.getElementById('btnInstall').addEventListener('click',async()=>{if(!deferredPrompt)return;deferredPrompt.prompt();await deferredPrompt.userChoice;deferredPrompt=null;document.getElementById('installBanner').style.display='none';});
if('serviceWorker'in navigator)navigator.serviceWorker.register('./service-worker.js').catch(()=>{});

/* INIT */
initUI();
renderPromo();
</script>
