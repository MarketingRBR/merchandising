<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#1a5a9e"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="RBR Agenda"/>
<meta name="description" content="Agenda de Promotores RBR — Jun-Jul 2025"/>
<meta name="version" content="v5-julho-2025"/>
<title>Agenda Promotores RBR</title>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="logo_rbr.png"/>
<link rel="icon" type="image/png" href="logo_rbr.png"/>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800&family=Barlow+Condensed:wght@600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{
  --rbr-blue:#1a5a9e; --rbr-blue-dark:#134882; --rbr-blue-mid:#1e6ab5; --rbr-sky:#3c9dd0;
  --manha:#1a6abf; --tarde:#e07b1a; --noite:#6b3fa0; --aniversario:#c0392b; --diurno-not:#1a8a6e;
  --bg:#eef2f8; --card:#ffffff; --text:#1a2533; --muted:#607080; --border:#dce5ef;
  --radius:14px; --shadow:0 2px 12px rgba(26,90,158,.10); --shadow-lg:0 6px 28px rgba(26,90,158,.18);

  /* marca colors */
  --c-tsa:#1a6abf; --c-osram:#e07b1a; --c-retrovex:#6b3fa0; --c-car80:#1a8a6e;
  --c-hipper:#c0392b; --c-perfect:#0e7c86; --c-kostal:#8e44ad; --c-riosulense:#b8860b;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:90px}
.app-shell{max-width:1200px;margin:0 auto}

/* ── HEADER ── */
.header{
  background:linear-gradient(140deg,var(--rbr-blue-dark) 0%,var(--rbr-blue) 55%,var(--rbr-sky) 100%);
  padding:14px 16px 16px; position:sticky; top:0; z-index:200;
  box-shadow:0 4px 20px rgba(26,90,158,.30);
}
.header-inner{max-width:1200px;margin:0 auto}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:10px;flex-wrap:wrap}
.logo-area{display:flex;align-items:center;gap:10px}
.logo-img{height:38px;width:auto;display:block}
.header-title{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:800;color:#fff;letter-spacing:.4px;line-height:1.15}
.header-sub{font-size:10px;font-weight:600;color:rgba(255,255,255,.65);letter-spacing:1px;text-transform:uppercase;margin-top:1px}
.btn-hoje{
  background:rgba(255,255,255,.18); border:1.5px solid rgba(255,255,255,.40); color:#fff;
  font-family:'Barlow',sans-serif; font-size:11px; font-weight:700; padding:7px 12px;
  border-radius:20px; cursor:pointer; display:flex; align-items:center; gap:5px;
  white-space:nowrap; transition:background .2s; flex-shrink:0;
}
.btn-hoje:active,.btn-hoje:hover{background:rgba(255,255,255,.30)}
.search-wrap{position:relative}
.search-wrap svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.60);width:15px;height:15px;flex-shrink:0}
#searchInput{
  width:100%; background:rgba(255,255,255,.15); border:1.5px solid rgba(255,255,255,.28);
  border-radius:10px; padding:9px 12px 9px 34px; color:#fff; font-family:'Barlow',sans-serif;
  font-size:14px; outline:none;
}
#searchInput::placeholder{color:rgba(255,255,255,.50)}
#searchInput:focus{border-color:rgba(255,255,255,.55);background:rgba(255,255,255,.22)}

/* ── LAYOUT GRID (desktop: calendar + list side by side) ── */
.content-grid{
  display:grid; grid-template-columns:1fr; gap:16px; padding:14px 16px 0;
}
@media (min-width:900px){
  .content-grid{grid-template-columns: 420px 1fr; align-items:start;}
}

/* ── FILTER PANEL ── */
.filter-panel{
  background:var(--card); border-radius:var(--radius); box-shadow:var(--shadow);
  border:1px solid var(--border); padding:14px; margin-bottom:14px;
}
.filter-panel-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.filter-panel-title{font-size:12px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.btn-clear{
  background:#fdeeee; color:var(--aniversario); border:1px solid #f5d0d0; border-radius:16px;
  padding:5px 11px; font-size:11px; font-weight:700; cursor:pointer; display:flex; align-items:center; gap:4px;
  white-space:nowrap;
}
.btn-clear:hover{background:#fbdada}

.filter-group{margin-bottom:12px}
.filter-group:last-child{margin-bottom:0}
.filter-group-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:7px;display:block}

/* chip filters - wrap freely, visible everywhere */
.chip-row{display:flex;flex-wrap:wrap;gap:7px}
.chip{
  background:#f4f7fb; border:1.5px solid var(--border); border-radius:18px;
  padding:6px 13px; font-family:'Barlow',sans-serif; font-size:12.5px; font-weight:600;
  color:var(--text); cursor:pointer; white-space:nowrap; transition:all .15s; user-select:none;
  display:inline-flex; align-items:center; gap:5px; line-height:1.3;
}
.chip:hover{border-color:var(--rbr-blue-mid)}
.chip.active{
  background:var(--rbr-blue); border-color:var(--rbr-blue); color:#fff;
  box-shadow:0 3px 10px rgba(26,90,158,.25);
}
.chip .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;display:inline-block}
.chip.active .dot{background:#fff !important}

/* select dropdowns (responsável / loja) */
select.flt{
  width:100%; background:#f4f7fb; border:1.5px solid var(--border); border-radius:10px;
  padding:9px 10px; font-family:'Barlow',sans-serif; font-size:13px; font-weight:600;
  color:var(--text); cursor:pointer; outline:none;
}
select.flt:focus{border-color:var(--rbr-blue)}

/* ── SUMMARY ── */
.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.stat-card{
  background:var(--card);border-radius:var(--radius);padding:12px 8px;
  text-align:center;box-shadow:var(--shadow);border:1px solid var(--border);
}
.stat-num{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:800;color:var(--rbr-blue);line-height:1}
.stat-lbl{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:3px}

/* ── CALENDAR ── */
.calendar-card{
  background:var(--card); border-radius:var(--radius); box-shadow:var(--shadow);
  border:1px solid var(--border); padding:14px; margin-bottom:14px;
}
.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-nav-btn{
  background:#f0f6ff; border:1.5px solid #c8daf5; color:var(--rbr-blue); border-radius:9px;
  width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;
  flex-shrink:0; transition:background .15s;
}
.cal-nav-btn:hover{background:#dceaff}
.cal-month-label{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800;color:var(--text);text-transform:capitalize;text-align:center;flex:1}
.cal-weekdays{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;margin-bottom:6px}
.cal-weekdays span{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-day{
  position:relative; aspect-ratio:1; border-radius:10px; display:flex; flex-direction:column;
  align-items:center; justify-content:center; cursor:pointer; font-size:13px; font-weight:600;
  color:var(--text); background:#f7f9fc; border:1.5px solid transparent; transition:all .15s; gap:2px;
}
.cal-day.empty{visibility:hidden;pointer-events:none}
.cal-day:hover{background:#eaf0fa}
.cal-day.has-action{background:#eaf2ff;border-color:#cfe0f7}
.cal-day.today{border-color:var(--rbr-blue);box-shadow:0 0 0 2px rgba(26,90,158,.15)}
.cal-day.selected{background:var(--rbr-blue);border-color:var(--rbr-blue);color:#fff}
.cal-day.selected .cal-day-num{color:#fff}
.cal-day-num{font-size:13px;font-weight:700;line-height:1}
.cal-day-dots{display:flex;gap:2px;justify-content:center;flex-wrap:wrap;max-width:28px}
.cal-day-dots span{width:5px;height:5px;border-radius:50%;display:inline-block}
.cal-day-count{
  position:absolute; top:2px; right:3px; font-size:8px; font-weight:800; color:var(--rbr-blue);
  background:#fff; border-radius:6px; padding:0px 3px; line-height:1.4; min-width:11px; text-align:center;
}
.cal-day.selected .cal-day-count{color:var(--rbr-blue);background:#fff}
.cal-legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.cal-legend-item{display:flex;align-items:center;gap:5px;font-size:10.5px;font-weight:600;color:var(--muted)}
.cal-legend-item .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.cal-clear-day{
  margin-top:10px; width:100%; background:#f4f7fb; border:1.5px solid var(--border); border-radius:9px;
  padding:8px; font-size:12px; font-weight:700; color:var(--rbr-blue); cursor:pointer; display:none;
  align-items:center; justify-content:center; gap:6px;
}
.cal-clear-day.show{display:flex}

/* ── ACTIVE FILTERS ── */
.active-filters{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.af-tag{
  background:#e8f2ff;color:var(--rbr-blue);
  border:1px solid #c8daf5;border-radius:12px;
  padding:4px 11px 4px 9px;font-size:11.5px;font-weight:600;
  display:flex;align-items:center;gap:5px;cursor:pointer;
}
.af-tag span{font-weight:800}

/* ── MAIN LIST ── */
.list-wrap{padding-bottom:8px}
.date-group{margin-bottom:22px}
.date-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.date-badge{
  background:var(--rbr-blue);color:#fff;
  font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:800;
  padding:4px 13px;border-radius:20px;letter-spacing:.5px;white-space:nowrap;
}
.date-badge.today{background:linear-gradient(135deg,var(--rbr-sky),var(--rbr-blue));box-shadow:0 3px 12px rgba(26,90,158,.35)}
.date-line{flex:1;height:1px;background:linear-gradient(to right,#dce5ef,transparent)}

.action-card{
  background:var(--card);border-radius:var(--radius);
  box-shadow:var(--shadow);margin-bottom:10px;
  overflow:hidden;border:1px solid var(--border);
  transition:transform .15s,box-shadow .15s;
}
.action-card:hover{transform:scale(1.005);box-shadow:var(--shadow-lg)}
.card-bar{height:4px;width:100%}
.tm .card-bar{background:linear-gradient(to right,var(--manha),var(--rbr-sky))}
.tt .card-bar{background:linear-gradient(to right,var(--tarde),#f5a623)}
.tn .card-bar{background:linear-gradient(to right,var(--noite),#9b59b6)}
.tdn .card-bar{background:linear-gradient(to right,var(--manha),var(--diurno-not))}
.ta .card-bar{background:linear-gradient(to right,var(--aniversario),#e74c3c)}

.card-body{padding:12px 14px 14px}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:7px;gap:8px}
.card-acao{font-size:15px;font-weight:700;color:var(--text);line-height:1.2;flex:1}
.turno-pill{font-size:10px;font-weight:700;padding:3px 9px;border-radius:10px;letter-spacing:.3px;white-space:nowrap;text-transform:uppercase;flex-shrink:0}
.tm .turno-pill{background:#e8f2ff;color:var(--manha)}
.tt .turno-pill{background:#fff3e2;color:var(--tarde)}
.tn .turno-pill{background:#f0eaff;color:var(--noite)}
.tdn .turno-pill{background:#e6fff9;color:var(--diurno-not)}
.ta .turno-pill{background:#fde9e9;color:var(--aniversario)}

.card-loja{font-size:13px;font-weight:600;color:var(--rbr-blue);margin-bottom:8px;display:flex;align-items:center;gap:5px}
.card-tags{display:flex;flex-wrap:wrap;gap:6px}
.tag{font-size:11px;font-weight:600;padding:3px 9px;border-radius:8px;display:flex;align-items:center;gap:4px}
.tag-m{background:#f0f6ff;color:var(--rbr-blue);border:1px solid #c8daf5}
.tag-r{background:#f5f5f5;color:#5a6a7a;border:1px solid #e0e0e0}
.tag-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;display:inline-block}

.no-results{text-align:center;padding:60px 20px;color:var(--muted)}
.no-results p{font-size:15px;font-weight:500}

.footer{
  background:linear-gradient(135deg,var(--rbr-blue-dark),var(--rbr-blue));
  color:rgba(255,255,255,.70);text-align:center;
  padding:18px 20px;font-size:12px;font-weight:500;letter-spacing:.3px;margin-top:8px;
}
.footer strong{color:#fff}

#installBanner{
  display:none;position:fixed;bottom:16px;left:16px;right:16px;max-width:500px;margin:0 auto;
  background:linear-gradient(135deg,var(--rbr-blue-dark),var(--rbr-blue));
  color:#fff;border-radius:var(--radius);padding:14px 16px;
  box-shadow:var(--shadow-lg);z-index:300;animation:slideUp .3s ease;
}
@keyframes slideUp{from{transform:translateY(80px);opacity:0}to{transform:translateY(0);opacity:1}}
.install-inner{display:flex;align-items:center;gap:12px}
.install-txt{flex:1;font-size:13px;line-height:1.4}
.install-txt strong{display:block;font-size:14px;margin-bottom:1px}
.btn-install{
  background:rgba(255,255,255,.20);border:1.5px solid rgba(255,255,255,.45);
  color:#fff;font-family:'Barlow',sans-serif;font-size:12px;font-weight:700;
  padding:6px 14px;border-radius:20px;cursor:pointer;white-space:nowrap;
}
.btn-close-banner{background:none;border:none;color:rgba(255,255,255,.7);font-size:18px;cursor:pointer;padding:2px 6px}

/* ── RESPONSIVE BREAKPOINTS ── */
@media (max-width:430px){
  .header-title{font-size:15px}
  .logo-img{height:32px}
  .btn-hoje{font-size:10px;padding:6px 10px}
  .stat-num{font-size:24px}
  .cal-day{font-size:11px}
}
@media (max-width:375px){
  .summary{gap:7px}
  .stat-card{padding:9px 5px}
  .filter-panel{padding:11px}
  .chip{padding:5px 10px;font-size:11.5px}
}
@media (min-width:1366px){
  .app-shell{max-width:1320px}
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-inner">
    <div class="header-top">
      <div class="logo-area">
        <img src="logo_rbr.png" alt="RBR" class="logo-img"/>
        <div>
          <div class="header-title">Agenda Promotores</div>
          <div class="header-sub">RBR · Jun–Jul 2025</div>
        </div>
      </div>
      <button class="btn-hoje" onclick="filtrarHoje()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        Minha Agenda de Hoje
      </button>
    </div>
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="searchInput" type="text" placeholder="Buscar ação, loja, marca, responsável…" oninput="render()"/>
    </div>
  </div>
</header>

<div class="app-shell">
  <div class="content-grid">

    <!-- LEFT COLUMN: calendar + filters -->
    <div class="left-col">

      <!-- CALENDAR -->
      <div class="calendar-card">
        <div class="cal-head">
          <div class="cal-nav-btn" onclick="changeMonth(-1)">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
          </div>
          <div class="cal-month-label" id="calMonthLabel"></div>
          <div class="cal-nav-btn" onclick="changeMonth(1)">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
          </div>
        </div>
        <div class="cal-weekdays">
          <span>D</span><span>S</span><span>T</span><span>Q</span><span>Q</span><span>S</span><span>S</span>
        </div>
        <div class="cal-grid" id="calGrid"></div>
        <div class="cal-clear-day" id="calClearDay" onclick="clearDaySelection()">
          ✕ Limpar seleção de dia
        </div>
        <div class="cal-legend" id="calLegend"></div>
      </div>

      <!-- FILTER PANEL -->
      <div class="filter-panel">
        <div class="filter-panel-head">
          <span class="filter-panel-title">Filtros</span>
          <button class="btn-clear" onclick="limparFiltros()">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            Limpar Filtros
          </button>
        </div>

        <div class="filter-group">
          <span class="filter-group-label">🏷️ Marca Parceira (múltiplas)</span>
          <div class="chip-row" id="chipMarcas"></div>
        </div>

        <div class="filter-group">
          <span class="filter-group-label">👤 Responsável</span>
          <select class="flt" id="fResp" onchange="render()">
            <option value="">Todos os responsáveis</option>
          </select>
        </div>

        <div class="filter-group">
          <span class="filter-group-label">🏬 Loja</span>
          <select class="flt" id="fLoja" onchange="render()">
            <option value="">Todas as lojas</option>
          </select>
        </div>
      </div>

    </div>

    <!-- RIGHT COLUMN: summary + active filters + list -->
    <div class="right-col">

      <div class="active-filters" id="activeFilters"></div>

      <div class="summary">
        <div class="stat-card"><div class="stat-num" id="sAcoes">0</div><div class="stat-lbl">Ações</div></div>
        <div class="stat-card"><div class="stat-num" id="sLojas">0</div><div class="stat-lbl">Lojas</div></div>
        <div class="stat-card"><div class="stat-num" id="sMarcas">0</div><div class="stat-lbl">Marcas</div></div>
      </div>

      <main class="list-wrap" id="agendaList"></main>

    </div>

  </div>
</div>

<!-- FOOTER -->
<footer class="footer">
  Desenvolvido por <strong>Marketing RBR</strong> · Jun–Jul 2025
</footer>

<!-- INSTALL BANNER -->
<div id="installBanner">
  <div class="install-inner">
    <div class="install-txt">
      <strong>📲 Adicionar à Tela Inicial</strong>
      Acesse a agenda offline como um app
    </div>
    <button class="btn-install" id="btnInstall">Instalar</button>
    <button class="btn-close-banner" onclick="document.getElementById('installBanner').style.display='none'">✕</button>
  </div>
</div>

<script>

  { data:"11/06", turno:"Diurno",         marcas:["Perfect"],                         loja:"Vasco Import – São Cristovão",  acao:"Compre e Ganhe",            resp:"Thayane (Promotora Iasmim)" },

const ANO_AGENDA = 2025;
const MES_AGENDA = 5; // junho — mês de início da agenda

/* ── calendar state inicia no mês atual ── */

const MARCA_COLORS = {
  "TSA":"#1a6abf","Osram":"#e07b1a","Retrovex":"#6b3fa0","CAR80":"#1a8a6e",
  "Hipper Freios":"#c0392b","Perfect":"#0e7c86","Kostal":"#8e44ad","RioSulense":"#b8860b",
  "BZM":"#d35400"
};
function marcaColor(m){ return MARCA_COLORS[m] || "#5a6a7a"; }

/* state */
let activeMarcas = new Set();
let calMonth = new Date().getMonth();   // inicia no mês atual do sistema
let calYear  = new Date().getFullYear();
let selectedDay = null; // "DD/MM" string or null

/* ── helpers ── */
function diaMesToKey(dia, mes){ return String(dia).padStart(2,'0')+'/'+String(mes+1).padStart(2,'0'); }
function turnoClass(t){
  const l=t.toLowerCase();
  if(l.includes('aniversário')||l.includes('aniversario')) return 'ta';
  if(l.includes('noturno')&&l.includes('diurno')) return 'tdn';
  if(l.includes('noite')||l.includes('noturno')) return 'tn';
  if(l.includes('tarde')) return 'tt';
  return 'tm';
}
function turnoPill(t){
  const l=t.toLowerCase();
  if(l.includes('aniversário')||l.includes('aniversario')) return '🎂 Aniversário';
  if(l.includes('noturno')&&l.includes('diurno')) return '☀️🌙 Dia/Noite';
  if(l.includes('noite')||l.includes('noturno')) return '🌙 Noite';
  if(l.includes('tarde')) return '🌅 Tarde';
  return '☀️ Diurno';
}
function todayKey(){
  const n=new Date();
  return String(n.getDate()).padStart(2,'0')+'/'+String(n.getMonth()+1).padStart(2,'0');
}

/* ── init filters UI ── */
function initFilterUI(){
  const allMarcas=[...new Set(AGENDA.flatMap(a=>a.marcas))].sort();
  const chipRow=document.getElementById('chipMarcas');
  chipRow.innerHTML='';
  allMarcas.forEach(m=>{
    const chip=document.createElement('div');
    chip.className='chip';
    chip.dataset.marca=m;
    chip.innerHTML=`<span class="dot" style="background:${marcaColor(m)}"></span>${m}`;
    chip.onclick=()=>toggleMarca(m);
    chipRow.appendChild(chip);
  });

  const resps=[...new Set(AGENDA.map(a=>a.resp))].sort();
  const fr=document.getElementById('fResp');
  resps.forEach(r=>{const o=document.createElement('option');o.value=r;o.textContent=r;fr.appendChild(o)});

  const lojas=[...new Set(AGENDA.map(a=>a.loja))].sort();
  const fl=document.getElementById('fLoja');
  lojas.forEach(l=>{const o=document.createElement('option');o.value=l;o.textContent=l;fl.appendChild(o)});

  // legend
  const legend=document.getElementById('calLegend');
  legend.innerHTML=allMarcas.map(m=>`<div class="cal-legend-item"><span class="dot" style="background:${marcaColor(m)}"></span>${m}</div>`).join('');
}

function toggleMarca(m){
  if(activeMarcas.has(m)) activeMarcas.delete(m);
  else activeMarcas.add(m);
  document.querySelectorAll('#chipMarcas .chip').forEach(c=>{
    c.classList.toggle('active', activeMarcas.has(c.dataset.marca));
  });
  render();
}

function limparFiltros(){
  activeMarcas.clear();
  document.querySelectorAll('#chipMarcas .chip').forEach(c=>c.classList.remove('active'));
  document.getElementById('fResp').value='';
  document.getElementById('fLoja').value='';
  document.getElementById('searchInput').value='';
  selectedDay=null;
  render();
}

/* ── CALENDAR RENDER ── */
const MESES_PT=["janeiro","fevereiro","março","abril","maio","junho","julho","agosto","setembro","outubro","novembro","dezembro"];

function changeMonth(delta){
  calMonth+=delta;
  if(calMonth<0){calMonth=11;calYear--;}
  if(calMonth>11){calMonth=0;calYear++;}
  renderCalendar();
}

function clearDaySelection(){
  selectedDay=null;
  render();
}

function renderCalendar(){
  document.getElementById('calMonthLabel').textContent = MESES_PT[calMonth]+' '+calYear;

  // build map dayKey -> entries (filtered by active marca/resp/loja chips, NOT by selectedDay itself)
  const filteredForCal = filterAgenda({ ignoreDay:true });
  const byDay = {};
  filteredForCal.forEach(a=>{
    if(!byDay[a.data]) byDay[a.data]=[];
    byDay[a.data].push(a);
  });

  const firstOfMonth = new Date(calYear, calMonth, 1);
  const startWeekday = firstOfMonth.getDay(); // 0=Sun
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const today = todayKey();
  const todayFullYear = new Date().getFullYear();
  const isCurrentMonthReal = (calYear===new Date().getFullYear() && calMonth===new Date().getMonth());

  const grid = document.getElementById('calGrid');
  grid.innerHTML='';

  for(let i=0;i<startWeekday;i++){
    const e=document.createElement('div');
    e.className='cal-day empty';
    grid.appendChild(e);
  }

  for(let d=1; d<=daysInMonth; d++){
    const key = diaMesToKey(d, calMonth);
    const entries = byDay[key] || [];
    const cell = document.createElement('div');
    cell.className = 'cal-day' + (entries.length?' has-action':'') + (isCurrentMonthReal && key===today?' today':'') + (selectedDay===key?' selected':'');
    cell.onclick = ()=> selectDay(key, entries.length);

    let dotsHtml='';
    if(entries.length){
      const marcasDoDia=[...new Set(entries.flatMap(e=>e.marcas))].slice(0,6);
      dotsHtml = `<div class="cal-day-dots">${marcasDoDia.map(m=>`<span style="background:${marcaColor(m)}"></span>`).join('')}</div>`;
    }
    cell.innerHTML = `
      ${entries.length?`<div class="cal-day-count">${entries.length}</div>`:''}
      <div class="cal-day-num">${d}</div>
      ${dotsHtml}
    `;
    grid.appendChild(cell);
  }

  document.getElementById('calClearDay').classList.toggle('show', !!selectedDay);
}

function selectDay(key, count){
  if(!count){ return; } // ignore days with nothing scheduled
  selectedDay = (selectedDay===key) ? null : key;
  render();
}

/* ── FILTER + RENDER LIST ── */
function filterAgenda(opts){
  opts = opts || {};
  const q = document.getElementById('searchInput').value.toLowerCase();
  const fr = document.getElementById('fResp').value;
  const fl = document.getElementById('fLoja').value;

  return AGENDA.filter(a=>{
    const matchSearch = !q || [a.acao,a.loja,a.resp,...a.marcas,a.data].some(v=>v.toLowerCase().includes(q));
    const matchMarca = activeMarcas.size===0 || a.marcas.some(m=>activeMarcas.has(m));
    const matchResp = !fr || a.resp===fr;
    const matchLoja = !fl || a.loja===fl;
    const matchDay = opts.ignoreDay || !selectedDay || a.data===selectedDay;
    return matchSearch && matchMarca && matchResp && matchLoja && matchDay;
  });
}

function render(){
  const list = filterAgenda();

  // summary
  document.getElementById('sAcoes').textContent = list.length;
  document.getElementById('sLojas').textContent = new Set(list.map(a=>a.loja)).size;
  document.getElementById('sMarcas').textContent = new Set(list.flatMap(a=>a.marcas)).size;

  // active filter chips display
  const afc = document.getElementById('activeFilters');
  afc.innerHTML='';
  if(selectedDay) afc.innerHTML += `<div class="af-tag" onclick="clearDaySelection()">📅 Dia ${selectedDay} <span>✕</span></div>`;
  activeMarcas.forEach(m=>{
    afc.innerHTML += `<div class="af-tag" onclick="toggleMarca('${m.replace(/'/g,"\\'")}')">🏷️ ${m} <span>✕</span></div>`;
  });
  const fr=document.getElementById('fResp').value;
  const fl=document.getElementById('fLoja').value;
  if(fr) afc.innerHTML += `<div class="af-tag" onclick="clrSelect('fResp')">👤 ${fr.split(' ')[0]} <span>✕</span></div>`;
  if(fl) afc.innerHTML += `<div class="af-tag" onclick="clrSelect('fLoja')">🏬 ${fl} <span>✕</span></div>`;

  const container = document.getElementById('agendaList');
  if(!list.length){
    container.innerHTML = '<div class="no-results"><p>😕 Nenhuma ação encontrada</p></div>';
    renderCalendar();
    return;
  }

  const hoje = todayKey();
  const groups = {};
  list.forEach(a=>{ if(!groups[a.data]) groups[a.data]=[]; groups[a.data].push(a); });

  // sort date groups by day/month
  const sortedKeys = Object.keys(groups).sort((a,b)=>{
    const [da,ma]=a.split('/').map(Number);
    const [db,mb]=b.split('/').map(Number);
    return (ma-mb)||(da-db);
  });

  container.innerHTML='';
  sortedKeys.forEach(data=>{
    const isToday = data===hoje;
    const g = document.createElement('div');
    g.className='date-group';
    g.innerHTML = `<div class="date-header"><div class="date-badge${isToday?' today':''}">${data}${isToday?' · HOJE':''}</div><div class="date-line"></div></div>`;
    groups[data].forEach(item=>{
      const tc = turnoClass(item.turno);
      const card = document.createElement('div');
      card.className = `action-card ${tc}`;
      card.innerHTML = `
        <div class="card-bar"></div>
        <div class="card-body">
          <div class="card-top">
            <div class="card-acao">${item.acao}</div>
            <div class="turno-pill">${turnoPill(item.turno)}</div>
          </div>
          <div class="card-loja">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
            ${item.loja}
          </div>
          <div class="card-tags">
            ${item.marcas.map(m=>`<span class="tag tag-m"><span class="tag-dot" style="background:${marcaColor(m)}"></span>${m}</span>`).join('')}
            <span class="tag tag-r">👤 ${item.resp}</span>
          </div>
        </div>`;
      g.appendChild(card);
    });
    container.appendChild(g);
  });

  renderCalendar();
}

function clrSelect(id){ document.getElementById(id).value=''; render(); }

function filtrarHoje(){
  const key = todayKey();
  selectedDay = key;
  calMonth = new Date().getMonth();
  calYear  = new Date().getFullYear();
  document.getElementById('searchInput').value='';
  render();
  document.querySelector('.right-col').scrollIntoView({behavior:'smooth'});
}

/* ── PWA install ── */
let deferredPrompt;
window.addEventListener('beforeinstallprompt', e=>{
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('installBanner').style.display='block';
});
document.getElementById('btnInstall').addEventListener('click', async ()=>{
  if(!deferredPrompt) return;
  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
  deferredPrompt = null;
  document.getElementById('installBanner').style.display='none';
});

/* ── Service Worker ── */
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./service-worker.js').catch(()=>{});
}

/* ── INIT ── */
initFilterUI();
render();
